<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
/* THEME VARIABLES */
:root{
  --bg:#f0f2f5;--surface:#ffffff;--border:#e0e0e0;--border-soft:#f0f0f0;
  --border-head:#e8e8f0;--header-bg:#ffffff;--head-bg:#f8f8ff;
  --text:#1a1a2e;--text-muted:#888;--text-light:#aaa;
  --accent:#4f46e5;--accent-hover:#ede9fe;--tab-bg:#f0f2f5;
  --input-border:#ddd;--btn-cancel-bg:#f0f0f0;--btn-cancel-fg:#555;
  --shadow:rgba(0,0,0,.08);--modal-shadow:rgba(0,0,0,.2);
  --now-line:#ef4444;--drag-over:rgba(79,70,229,.05);
  --sidebar-w:212px;--off-hours-bg:rgba(0,0,0,0.05);
}
[data-theme="dark"]{
  --bg:#0f1117;--surface:#1e2130;--border:#2e3250;--border-soft:#252840;
  --border-head:#2a2e4a;--header-bg:#161926;--head-bg:#1a1e30;
  --text:#e4e6f0;--text-muted:#8888aa;--text-light:#555880;
  --accent:#7c74f5;--accent-hover:#2a2560;--tab-bg:#252840;
  --input-border:#3a3e60;--btn-cancel-bg:#252840;--btn-cancel-fg:#aaa;
  --shadow:rgba(0,0,0,.3);--modal-shadow:rgba(0,0,0,.6);
  --now-line:#f87171;--drag-over:rgba(124,116,245,.08);--off-hours-bg:rgba(255,255,255,0.07);
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;transition:background .2s,color .2s}
/* ── Header ── */
header{background:var(--header-bg);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;align-items:center;flex-shrink:0;transition:background .2s,border-color .2s}
.hdr-left{display:flex;align-items:center;flex:1}
.hdr-center{display:flex;align-items:center;gap:8px;flex-shrink:0}
.hdr-right{display:flex;align-items:center;gap:8px;flex:1;justify-content:flex-end}
header h1{font-size:1.2rem;font-weight:700;color:var(--accent)}
.nav-btn{background:none;border:1px solid var(--input-border);border-radius:6px;padding:5px 11px;cursor:pointer;font-size:0.9rem;color:var(--text);transition:all .15s}
.nav-btn:hover{background:var(--tab-bg)}
#current-label{font-size:1rem;font-weight:600;min-width:160px;text-align:center}
.view-tabs{display:flex;gap:4px;background:var(--tab-bg);border-radius:8px;padding:4px}
.view-tab{border:none;background:none;padding:5px 13px;border-radius:6px;cursor:pointer;font-size:0.83rem;font-weight:500;color:var(--text-muted);transition:all .15s}
.view-tab.active{background:var(--surface);color:var(--accent);box-shadow:0 1px 3px var(--shadow)}
#today-btn{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:5px 13px;cursor:pointer;font-size:0.83rem;font-weight:500}
.week-toggle{display:flex;gap:4px;background:var(--tab-bg);border-radius:8px;padding:4px}
.week-toggle button{border:none;background:none;padding:4px 9px;border-radius:5px;cursor:pointer;font-size:0.78rem;color:var(--text-muted)}
.week-toggle button.active{background:var(--surface);color:var(--accent);box-shadow:0 1px 3px var(--shadow)}
#theme-btn{background:none;border:1px solid var(--input-border);border-radius:6px;padding:5px 9px;cursor:pointer;font-size:1rem;line-height:1;transition:all .15s}
#theme-btn:hover{background:var(--tab-bg)}
#status-bar{font-size:0.73rem;padding:2px 8px;border-radius:4px;font-weight:600;white-space:nowrap}
#status-bar.idle{background:#f0fdf4;color:#16a34a}
#status-bar.pending{background:#fef9c3;color:#a16207}
#status-bar.error{background:#fee2e2;color:#dc2626}
[data-theme="dark"] #status-bar.idle{background:#14281e;color:#4ade80}
[data-theme="dark"] #status-bar.pending{background:#2a2000;color:#facc15}
[data-theme="dark"] #status-bar.error{background:#2a1010;color:#f87171}
/* ── App wrapper (sidebar + cal) ── */
.app-wrapper{display:flex;flex:1;overflow:hidden;min-height:0}
/* ── Sidebar ── */
.sidebar{width:var(--sidebar-w);min-width:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;transition:width .22s ease,min-width .22s ease,background .2s,border-color .2s}
.sidebar.collapsed{width:36px;min-width:36px}
.sidebar-toggle-btn{width:100%;display:flex;align-items:center;justify-content:center;padding:9px 0;background:none;border:none;border-bottom:1px solid var(--border-soft);cursor:pointer;color:var(--text-muted);font-size:0.85rem;flex-shrink:0;transition:background .15s,color .15s}
.sidebar-toggle-btn:hover{background:var(--drag-over);color:var(--text)}
.sidebar-content{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0;min-width:var(--sidebar-w);transition:opacity .15s ease}
.sidebar.collapsed .sidebar-content{opacity:0;pointer-events:none}
.sidebar-header{padding:11px 12px 8px;font-size:0.7rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border-soft);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sidebar-add-btn{background:var(--accent);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:1.1rem;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s}
.sidebar-add-btn:hover{opacity:.82}
.cal-list{flex:1;overflow-y:auto;padding:6px 0}
.cal-item{display:flex;align-items:center;gap:6px;padding:7px 10px 7px 12px;cursor:pointer;transition:background .1s;user-select:none}
.cal-item:hover{background:var(--tab-bg)}
.cal-item.active .cal-item-name{color:var(--accent);font-weight:600}
.cal-item input[type="radio"]{accent-color:var(--accent);cursor:pointer;flex-shrink:0;width:14px;height:14px}
.cal-item-name{font-size:0.83rem;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);cursor:pointer}
.cal-del-btn{opacity:0;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:0.78rem;padding:1px 3px;line-height:1;flex-shrink:0;transition:opacity .15s,color .15s;border-radius:3px}
.cal-item:hover .cal-del-btn{opacity:.55}
.cal-del-btn:hover{opacity:1!important;color:#ef4444}
.cal-empty{padding:18px 12px;font-size:0.78rem;color:var(--text-muted);text-align:center;line-height:1.5}
/* ── Calendar groups ── */
.cal-group{border-bottom:1px solid var(--border-soft)}
.cal-group-header{display:flex;align-items:center;gap:4px;padding:7px 10px 7px 8px;cursor:pointer;user-select:none;font-size:0.78rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;transition:background .1s}
.cal-group-header:hover{background:var(--tab-bg)}
.cal-group-arrow{font-size:0.7rem;transition:transform .15s;width:14px;text-align:center;flex-shrink:0}
.cal-group-header.collapsed .cal-group-arrow{transform:rotate(-90deg)}
.cal-group-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cal-group-actions{display:flex;gap:2px;opacity:0;transition:opacity .15s}
.cal-group-header:hover .cal-group-actions{opacity:.7}
.cal-group-actions button{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:0.72rem;padding:1px 3px;line-height:1;border-radius:3px;transition:color .15s}
.cal-group-actions button:hover{color:var(--accent)}
.cal-group-actions .grp-del-btn:hover{color:#ef4444}
.cal-group-add-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:0.8rem;padding:1px 4px;line-height:1;border-radius:3px;transition:color .15s,opacity .15s;opacity:0}
.cal-group-header:hover .cal-group-add-btn{opacity:.7}
.cal-group-add-btn:hover{color:var(--accent);opacity:1!important}
.cal-group-body{overflow:hidden;transition:max-height .2s ease}
.cal-group-body.collapsed{max-height:0!important;overflow:hidden}
.cal-group.drag-over>.cal-group-header{background:var(--accent-hover);outline:2px dashed var(--accent);border-radius:4px}
.cal-item .cal-edit-btn{opacity:0;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:0.72rem;padding:1px 3px;line-height:1;flex-shrink:0;transition:opacity .15s,color .15s;border-radius:3px}
.cal-item:hover .cal-edit-btn{opacity:.55}
.cal-edit-btn:hover{opacity:1!important;color:var(--accent)}
.cal-item[draggable="true"]{cursor:grab}
.cal-item[draggable="true"]:active{cursor:grabbing}
.cal-item.dragging{opacity:0.35}
/* ── Mini-month calendar (sidebar) ── */
.mini-cal{padding:8px 6px 6px;border-bottom:1px solid var(--border-soft);flex-shrink:0}
.mini-cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.mini-nav-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;padding:2px 6px;border-radius:4px;font-size:0.75rem;line-height:1;transition:background .1s,color .1s}
.mini-nav-btn:hover{background:var(--tab-bg);color:var(--text)}
.mini-cal-title{font-size:0.78rem;font-weight:700;color:var(--text);cursor:pointer;padding:2px 5px;border-radius:4px;transition:background .1s,color .1s;white-space:nowrap}
.mini-cal-title:hover{background:var(--tab-bg);color:var(--accent)}
.mini-grid{display:grid;grid-template-columns:14px repeat(7,1fr);row-gap:1px}
.mini-dow{text-align:center;font-size:0.58rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;padding-bottom:3px}
.mini-week-btn{display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-light);font-size:0.62rem;border-radius:3px;transition:background .1s,color .1s}
.mini-week-btn:hover{background:var(--tab-bg);color:var(--accent)}
.mini-day{text-align:center;font-size:0.72rem;padding:3px 1px;border-radius:50%;cursor:pointer;color:var(--text);transition:background .1s;line-height:1.4;user-select:none}
.mini-day:hover:not(.mc-today){background:var(--tab-bg)}
.mini-day.mc-other{color:var(--text-light)}
.mini-day.mc-today{background:var(--accent);color:#fff!important;font-weight:700}
.mini-day.mc-selected{background:var(--accent-hover);color:var(--accent);font-weight:600}
.mini-day.mc-in-week{background:var(--accent-hover)}
.mini-day.mc-today.mc-in-week{background:var(--accent);color:#fff!important}
/* ── Calendar area ── */
#cal{flex:1;overflow:auto;background:var(--surface);margin:10px;border-radius:12px;box-shadow:0 1px 6px var(--shadow);display:flex;flex-direction:column;transition:background .2s}
/* ── Month ── */
.month-grid{display:flex;flex-direction:column;flex:1}
.week-row{display:grid;grid-template-columns:repeat(7,1fr);position:relative;flex:1}
.md-banner{position:absolute;height:20px;line-height:20px;border-radius:4px;color:#fff;font-size:0.71rem;font-weight:500;padding:0 5px 0 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;z-index:5;cursor:pointer;border-left:3px solid var(--ev-accent)}
.md-banner:hover{opacity:.85}
.md-cont-left{border-top-left-radius:0;border-bottom-left-radius:0;padding-left:3px}
.md-cont-right{border-top-right-radius:0;border-bottom-right-radius:0;padding-right:3px}
.md-spacer{flex-shrink:0}
.md-allday-span{position:relative;z-index:10;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.month-header{display:grid;grid-template-columns:repeat(7,1fr);background:var(--head-bg);border-bottom:1px solid var(--border-head)}
.month-header div{text-align:center;padding:9px 0;font-size:0.76rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em}
.month-cell{border-right:1px solid var(--border-soft);border-bottom:1px solid var(--border-soft);padding:6px;min-height:96px;cursor:pointer;transition:background .1s;position:relative;overflow:hidden}
.month-cell:hover{background:var(--head-bg)}
.month-cell.other-month .day-num{color:var(--text-light)}
.month-cell.today .day-num{background:var(--accent);color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center}
.day-num{font-size:0.83rem;font-weight:600;margin-bottom:4px;width:26px;height:26px;display:flex;align-items:center;justify-content:center}
.month-event{font-size:0.71rem;padding:2px 5px 2px 8px;border-radius:4px;margin-bottom:2px;cursor:grab;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;font-weight:500;border-left:3px solid var(--ev-accent)}
.month-event:active{cursor:grabbing}
.more-events{font-size:0.69rem;color:var(--accent);font-weight:600;cursor:pointer;padding:1px 4px}
/* ── Week / Day ── */
.week-container{display:flex;flex-direction:column;flex:1;overflow:hidden}
.week-head{display:flex;border-bottom:1px solid var(--border-head);background:var(--head-bg);flex-shrink:0;padding-right:8px}
.week-head-time{width:58px;flex-shrink:0}
.week-head-day{flex:1;text-align:center;padding:9px 4px;border-left:1px solid var(--border-soft)}
.week-head-day .wday{font-size:0.73rem;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.week-head-day .wdate{font-size:1.25rem;font-weight:700;color:var(--text);width:34px;height:34px;display:flex;align-items:center;justify-content:center;margin:2px auto 0;border-radius:50%;cursor:pointer}
.week-head-day .wdate:hover{background:var(--tab-bg)}
.week-head-day .wdate.today{background:var(--accent);color:#fff}
.week-body{display:flex;flex:1;overflow-y:scroll}
.week-body::-webkit-scrollbar{width:8px}
.week-body::-webkit-scrollbar-track{background:transparent}
.week-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.week-body::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}
.time-col{width:58px;flex-shrink:0}
.time-slot{height:56px;border-bottom:1px solid var(--border-soft);display:flex;align-items:flex-start;padding-top:2px;padding-right:5px;justify-content:flex-end;font-size:0.69rem;color:var(--text-light);font-weight:500}
.days-col{flex:1;display:flex;position:relative}
.day-col{flex:1;border-left:1px solid var(--border-soft);position:relative}
.hour-row{height:56px;border-bottom:1px solid var(--border-soft);cursor:pointer;transition:background .1s}
.hour-row.off-hours,.time-slot.off-hours{background:var(--off-hours-bg)}
.hour-row:hover{background:var(--head-bg)}
.week-event{position:absolute;border-radius:6px;padding:3px 6px 3px 10px;font-size:0.74rem;font-weight:600;color:#fff;cursor:grab;overflow:hidden;z-index:2;box-shadow:0 1px 4px rgba(0,0,0,.15);border-left:4px solid var(--ev-accent)}
.week-event:active{cursor:grabbing;opacity:.8}
.ev-resize-top{position:absolute;top:0;left:0;right:0;height:7px;cursor:ns-resize;z-index:10;border-radius:6px 6px 0 0}
.ev-resize-bottom{position:absolute;bottom:0;left:0;right:0;height:7px;cursor:ns-resize;z-index:10;border-radius:0 0 6px 6px}
.ev-resize-top::after,.ev-resize-bottom::after{content:'';position:absolute;left:50%;width:22px;height:2px;background:rgba(255,255,255,.55);border-radius:1px;top:50%;transform:translate(-50%,-50%)}
.week-event.resizing{opacity:.85;cursor:ns-resize!important;user-select:none}
body.resizing-active{cursor:ns-resize!important;user-select:none}
.week-event .ev-title{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.week-event .ev-time{font-size:0.67rem;opacity:.85}
.now-line{position:absolute;left:0;right:0;height:2px;background:var(--now-line);z-index:3;pointer-events:none}
.now-line::before{content:'';position:absolute;left:-4px;top:-4px;width:10px;height:10px;background:var(--now-line);border-radius:50%}
/* ── All-day strip (week & day views) ── */
.allday-row{display:flex;border-bottom:1px solid var(--border-head);background:var(--head-bg);flex-shrink:0;min-height:32px;padding-right:8px}
.allday-gutter{width:58px;flex-shrink:0;font-size:0.6rem;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em;display:flex;align-items:flex-start;justify-content:flex-end;padding:5px 5px 0 0}
.allday-col{flex:1;border-left:1px solid var(--border-soft);padding:3px 3px 4px;display:flex;flex-direction:column;gap:2px;min-height:32px}
.allday-event{font-size:0.72rem;padding:2px 7px 2px 10px;border-radius:4px;color:#fff;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:grab;transition:opacity .1s;user-select:none;border-left:3px solid var(--ev-accent)}
.allday-event:active{cursor:grabbing}
.allday-event.dragging{opacity:0.35;cursor:grabbing}
.allday-col.drag-over{background:var(--accent-hover);outline:2px dashed var(--accent);border-radius:4px}
.allday-event:hover{opacity:.82}
/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:var(--surface);border-radius:16px;padding:26px 28px;width:auto;max-width:min(780px,calc(100vw - 32px));max-height:calc(100vh - 40px);overflow-y:auto;box-shadow:0 20px 60px var(--modal-shadow);border:1px solid var(--border)}
.modal-body{display:flex;align-items:flex-start;gap:0}
.modal-left{width:310px;flex-shrink:0}
.modal-right{width:295px;flex-shrink:0;border-left:1px solid var(--border-soft);padding-left:20px;margin-left:20px}
.modal-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-row-2>div{min-width:0}
.modal h2{margin-bottom:18px;font-size:1.05rem;color:var(--text)}
.modal label{display:block;font-size:0.78rem;font-weight:600;color:var(--text-muted);margin-bottom:4px;margin-top:13px}
.modal input,.modal textarea,.modal select{width:100%;border:1px solid var(--input-border);border-radius:8px;padding:8px 11px;font-size:0.88rem;font-family:inherit;outline:none;transition:border .15s;background:var(--bg);color:var(--text)}
.modal input:focus,.modal textarea:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.modal-actions button{flex:1;padding:10px;border-radius:8px;border:none;cursor:pointer;font-size:0.88rem;font-weight:600}
.btn-save{background:var(--accent);color:#fff}
.btn-cancel{background:var(--btn-cancel-bg);color:var(--btn-cancel-fg)}
.btn-delete{background:#fee2e2;color:#dc2626}
[data-theme="dark"] .btn-delete{background:#2a1010;color:#f87171}
.color-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.color-swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:border .1s}
.color-swatch.selected{border-color:var(--text)}
/* ── All-day toggle ── */
.toggle-switch{width:42px;height:24px;background:var(--input-border);border-radius:12px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.toggle-switch.on{background:var(--accent)}
.toggle-thumb{position:absolute;top:3px;left:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle-switch.on .toggle-thumb{transform:translateX(18px)}
.modal textarea{resize:vertical;min-height:70px}
/* ── Settings button (sidebar bottom) ── */
#settings-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 0;background:none;border:none;border-top:1px solid var(--border-soft);cursor:pointer;color:var(--text-muted);font-size:0.78rem;font-weight:600;flex-shrink:0;transition:background .15s,color .15s}
#settings-btn:hover{background:var(--drag-over);color:var(--text)}
/* ── Settings panel ── */
.settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center}
.settings-panel{background:var(--surface);border-radius:16px;padding:24px 28px;width:340px;max-width:calc(100vw - 32px);box-shadow:0 20px 60px var(--modal-shadow);border:1px solid var(--border)}
.settings-panel h2{font-size:1.05rem;margin-bottom:18px;color:var(--text)}
.settings-group{margin-bottom:16px}
.settings-group label{display:block;font-size:0.78rem;font-weight:600;color:var(--text-muted);margin-bottom:6px}
.settings-color-row{display:flex;align-items:center;gap:10px}
.settings-color-row input[type="color"]{width:40px;height:32px;border:1px solid var(--input-border);border-radius:6px;padding:2px;cursor:pointer;background:var(--bg)}
.settings-color-row input[type="text"]{width:90px;border:1px solid var(--input-border);border-radius:6px;padding:6px 8px;font-size:0.85rem;font-family:monospace;background:var(--bg);color:var(--text)}
.settings-actions{display:flex;gap:10px;margin-top:20px}
.settings-actions button{flex:1;padding:9px;border-radius:8px;border:none;cursor:pointer;font-size:0.85rem;font-weight:600}
.settings-actions .btn-save{background:var(--accent);color:#fff}
.settings-actions .btn-cancel{background:var(--btn-cancel-bg);color:var(--btn-cancel-fg)}
.settings-actions .btn-reset{background:#fee2e2;color:#dc2626;flex:0.7}
[data-theme="dark"] .settings-actions .btn-reset{background:#2a1010;color:#f87171}
/* ── Month/Year Picker ── */
#current-label{cursor:pointer;padding:4px 10px;border-radius:6px;transition:background .15s}
#current-label:hover{background:var(--tab-bg)}
.monthpicker-popup{position:absolute;top:100%;left:50%;transform:translateX(-50%);margin-top:6px;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 30px var(--modal-shadow);padding:16px 20px;z-index:150;display:none;min-width:220px}
.monthpicker-popup.open{display:block}
.mp-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.mp-row label{font-size:0.78rem;font-weight:600;color:var(--text-muted);width:48px;flex-shrink:0}
.mp-row select,.mp-row input[type="number"]{flex:1;border:1px solid var(--input-border);border-radius:6px;padding:6px 8px;font-size:0.88rem;background:var(--bg);color:var(--text);font-family:inherit;outline:none}
.mp-row input[type="number"]{-moz-appearance:textfield;appearance:textfield;width:80px}
.mp-row input[type="number"]::-webkit-inner-spin-button,.mp-row input[type="number"]::-webkit-outer-spin-button{opacity:1;height:28px}
.mp-actions{display:flex;gap:8px}
.mp-actions button{flex:1;padding:8px;border-radius:8px;border:none;cursor:pointer;font-size:0.83rem;font-weight:600}
.mp-actions .btn-save{background:var(--accent);color:#fff}
.mp-actions .btn-cancel{background:var(--btn-cancel-bg);color:var(--btn-cancel-fg)}
/* ── Event hover popover ── */
.ev-popover{position:fixed;z-index:300;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 28px var(--modal-shadow);padding:12px 16px;pointer-events:none;opacity:0;transition:opacity .15s;max-width:300px;min-width:180px}
.ev-popover.visible{opacity:1}
.ev-popover-title{font-size:0.88rem;font-weight:700;color:var(--text);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.ev-popover-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ev-popover-row{display:flex;align-items:center;gap:6px;font-size:0.78rem;color:var(--text-muted);margin-bottom:3px}
.ev-popover-row svg{width:14px;height:14px;flex-shrink:0;fill:none;stroke:var(--text-muted);stroke-width:2}
.ev-popover-notes{font-size:0.75rem;color:var(--text-muted);margin-top:6px;border-top:1px solid var(--border-soft);padding-top:6px;white-space:pre-wrap;max-height:60px;overflow:hidden;text-overflow:ellipsis}

/* ── Multi-calendar: sidebar checkboxes & color dots ──────────────────── */
.cal-item{display:flex;align-items:center;gap:6px;padding:4px 8px;cursor:pointer;border-radius:4px;transition:background .15s}
.cal-item:hover{background:var(--hover)}
.cal-item.primary{font-weight:600}
.cal-chk{width:15px;height:15px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
.cal-color-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cal-item-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:0.82rem}

/* ── Multi-calendar: tab bar above calendar ───────────────────────────── */
#cal-tabs{display:flex;gap:4px;padding:8px 10px 2px;min-height:0;flex-wrap:wrap;flex-shrink:0;align-items:center}
#cal-tabs:empty{display:none}
.cal-main{display:flex;flex-direction:column;flex:1;min-height:0;min-width:0}
.cal-tab{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:14px;font-size:0.78rem;background:var(--tab-bg);cursor:pointer;transition:background .15s;user-select:none}
.cal-tab:hover{background:var(--border-soft)}
.cal-tab.active{outline:2px solid var(--accent);background:var(--accent-hover)}
.cal-tab.primary{background:var(--accent);color:#fff;outline:none}
.cal-tab.primary:hover{opacity:.9}
.cal-tab-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cal-tab-name{max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cal-tab-close{font-size:1rem;line-height:1;opacity:.5;cursor:pointer}
.cal-tab-close:hover{opacity:1}

.week-event.ev-selected{outline:2px solid var(--accent);outline-offset:-1px}
.month-event.ev-selected{outline:2px solid var(--accent);outline-offset:-1px}
.allday-event.ev-selected{outline:2px solid var(--accent);outline-offset:-1px}
.md-banner.ev-selected{outline:2px solid var(--accent);outline-offset:-1px}

/* ── Multi-calendar: modal calendar dropdown ──────────────────────────── */
#ev-calendar{width:100%;padding:6px 8px;border:1px solid var(--border-soft);border-radius:4px;background:var(--bg);color:var(--text);font-size:0.85rem;margin-bottom:4px}
</style>
</head>
<body>
<header>
  <!-- Left: app title -->
  <div class="hdr-left">
    <h1>Access Calendar</h1>
  </div>
  <!-- Center: month/year navigator -->
  <div class="hdr-center" style="position:relative">
    <button class="nav-btn" id="prev-btn">&#8249;</button>
    <span id="current-label"></span>
    <button class="nav-btn" id="next-btn">&#8250;</button>
    <!-- Month/Year picker popup -->
    <div class="monthpicker-popup" id="monthpicker">
      <div class="mp-row">
        <label>Month</label>
        <select id="mp-month"></select>
      </div>
      <div class="mp-row">
        <label>Year</label>
        <input type="number" id="mp-year" min="1900" max="2100">
      </div>
      <div class="mp-actions">
        <button class="btn-cancel" id="mp-cancel">Cancel</button>
        <button class="btn-save" id="mp-go">Go</button>
      </div>
    </div>
  </div>
  <!-- Right: view controls + theme + status -->
  <div class="hdr-right">
    <button id="today-btn">Today</button>
    <div id="week-toggle-wrap" class="week-toggle" style="display:none">
      <button id="w5-btn">5 days</button>
      <button id="w7-btn" class="active">7 days</button>
    </div>
    <div class="view-tabs">
      <button class="view-tab" data-view="month">Month</button>
      <button class="view-tab" data-view="week">Week</button>
      <button class="view-tab" data-view="day">Day</button>
    </div>
    <span id="status-bar" class="idle">&#9679; Connected</span>
  </div>
</header>

<div class="app-wrapper">
  <!-- Left sidebar: calendar list -->
  <nav class="sidebar" id="sidebar">
    <!-- Collapse / expand toggle -->
    <button id="sidebar-toggle-btn" class="sidebar-toggle-btn" title="Collapse sidebar">&#8249;</button>
    <!-- All sidebar content — fades out when collapsed -->
    <div class="sidebar-content">
      <!-- Mini-month calendar -->
      <div class="mini-cal">
        <div class="mini-cal-nav">
          <button class="mini-nav-btn" id="mini-prev" title="Previous month">&#8249;</button>
          <span class="mini-cal-title" id="mini-cal-title"></span>
          <button class="mini-nav-btn" id="mini-next" title="Next month">&#8250;</button>
        </div>
        <div class="mini-grid" id="mini-cal-grid"></div>
      </div>
      <!-- Calendar list -->
      <div class="sidebar-header">
        <span>Calendars</span>
        <button class="sidebar-add-btn" id="add-group-btn" title="New Group">+</button>
      </div>
      <div class="cal-list" id="cal-list">
        <div class="cal-empty">No calendars yet</div>
      </div>
      <button id="settings-btn" title="Settings">&#9881; Settings</button>
    </div><!-- end .sidebar-content -->
  </nav>
  <!-- Calendar main (tabs + calendar area) -->
  <div class="cal-main">
    <!-- Calendar tab bar -->
    <div id="cal-tabs"></div>
    <!-- Main calendar area -->
    <div id="cal"></div>
  </div>
</div>

<!-- Appointment Modal -->
<div id="modal-overlay" class="modal-overlay" style="display:none">
  <div class="modal">
    <h2 id="modal-title">New Appointment</h2>
    <div class="modal-body">

      <!-- ── LEFT COLUMN ─────────────────────────────────────────── -->
      <div class="modal-left">
        <label>Calendar</label>
        <select id="ev-calendar"></select>

        <label>Title</label>
        <input type="text" id="ev-title" placeholder="Appointment title">

        <div class="modal-row-2" style="margin-top:13px">
          <div>
            <label style="margin-top:0">Date</label>
            <input type="date" id="ev-date">
          </div>
          <div>
            <label style="margin-top:0">End Date <span style="font-size:0.72rem;color:var(--text-muted);font-weight:400">(multi-day)</span></label>
            <input type="date" id="ev-end-date">
          </div>
        </div>

        <label style="display:flex;align-items:center;justify-content:space-between;margin-top:14px">
          <span>All Day</span>
          <div id="allday-toggle" class="toggle-switch" role="switch" aria-checked="false">
            <div class="toggle-thumb"></div>
          </div>
        </label>

        <div id="time-fields">
          <div class="modal-row-2">
            <div>
              <label>Start Time</label>
              <input type="time" id="ev-start">
            </div>
            <div>
              <label>End Time</label>
              <input type="time" id="ev-end">
            </div>
          </div>
        </div>

        <label>Notes</label>
        <textarea id="ev-notes" placeholder="Add notes" rows="2"></textarea>

        <label>Color</label>
        <div class="color-row" id="color-row"></div>

        <label>Reminder</label>
        <select id="ev-reminder">
          <option value="-1">None</option>
          <option value="0">0 minutes</option>
          <option value="5">5 minutes</option>
          <option value="10">10 minutes</option>
          <option value="15" selected>15 minutes</option>
          <option value="30">30 minutes</option>
          <option value="60">1 hour</option>
          <option value="120">2 hours</option>
          <option value="180">3 hours</option>
          <option value="240">4 hours</option>
          <option value="300">5 hours</option>
          <option value="360">6 hours</option>
          <option value="420">7 hours</option>
          <option value="480">8 hours</option>
          <option value="540">9 hours</option>
          <option value="600">10 hours</option>
          <option value="660">11 hours</option>
          <option value="720">0.5 days</option>
          <option value="1080">18 hours</option>
          <option value="1440">1 day</option>
          <option value="2880">2 days</option>
        </select>

        <div style="margin-top:14px;border-top:1px solid var(--border-soft);padding-top:10px;display:flex;align-items:center;justify-content:space-between">
          <span style="font-size:0.78rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em">Recurrence</span>
          <button id="recur-toggle-btn" type="button"
            style="background:none;border:1px solid var(--input-border);border-radius:6px;padding:3px 10px;font-size:0.78rem;color:var(--text);cursor:pointer">
            Make Recurring
          </button>
        </div>

        <div class="modal-actions">
          <button class="btn-cancel" id="modal-cancel">Cancel</button>
          <button class="btn-delete" id="modal-delete" style="display:none">Delete</button>
          <button class="btn-save" id="modal-save">Save</button>
        </div>
      </div><!-- end .modal-left -->

      <!-- ── RIGHT COLUMN (recurrence panel, hidden until toggled) ── -->
      <div class="modal-right" id="modal-right" style="display:none">
        <div style="font-size:0.78rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border-soft)">Recurrence Pattern</div>

        <div id="recur-panel">
          <!-- Pattern type -->
          <div style="display:flex;gap:12px;flex-wrap:wrap;font-size:0.82rem;margin-bottom:8px">
            <label style="display:flex;align-items:center;gap:4px"><input type="radio" name="recur-type" value="daily"> Daily</label>
            <label style="display:flex;align-items:center;gap:4px"><input type="radio" name="recur-type" value="weekly"> Weekly</label>
            <label style="display:flex;align-items:center;gap:4px"><input type="radio" name="recur-type" value="monthly"> Monthly</label>
            <label style="display:flex;align-items:center;gap:4px"><input type="radio" name="recur-type" value="yearly"> Yearly</label>
          </div>

          <!-- Daily -->
          <div id="rp-daily" style="display:none;font-size:0.82rem;margin-bottom:8px">
            Every <input id="r-daily-int" type="number" value="1" min="1" max="365"
              style="width:46px;text-align:center;padding:2px 4px;border:1px solid var(--input-border);border-radius:4px;background:var(--bg);color:var(--text)"> day(s)
          </div>

          <!-- Weekly -->
          <div id="rp-weekly" style="display:none;font-size:0.82rem;margin-bottom:8px">
            <div style="margin-bottom:6px">
              Every <input id="r-weekly-int" type="number" value="1" min="1" max="52"
                style="width:46px;text-align:center;padding:2px 4px;border:1px solid var(--input-border);border-radius:4px;background:var(--bg);color:var(--text)"> week(s) on:
            </div>
            <div id="r-dow-row" style="display:flex;gap:6px;flex-wrap:wrap"></div>
          </div>

          <!-- Monthly -->
          <div id="rp-monthly" style="display:none;font-size:0.82rem;margin-bottom:8px">
            <label style="display:flex;align-items:center;gap:5px;margin-bottom:5px;flex-wrap:wrap">
              <input type="radio" name="r-monthly-mode" value="day" checked>
              Day <input id="r-month-day" type="number" value="1" min="1" max="31"
                style="width:40px;text-align:center;padding:2px 4px;border:1px solid var(--input-border);border-radius:4px;background:var(--bg);color:var(--text)">
              of every <input id="r-month-int" type="number" value="1" min="1" max="99"
                style="width:40px;text-align:center;padding:2px 4px;border:1px solid var(--input-border);border-radius:4px;background:var(--bg);color:var(--text)"> month(s)
            </label>
            <label style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
              <input type="radio" name="r-monthly-mode" value="weekday">
              The
              <select id="r-month-week" style="padding:2px 4px;border:1px solid var(--input-border);border-radius:4px;background:var(--bg);color:var(--text)">
                <option value="1">First</option><option value="2">Second</option>
                <option value="3">Third</option><option value="4">Fourth</option><option value="-1">Last</option>
              </select>
              <select id="r-month-dow" style="padding:2px 4px;border:1px solid var(--input-border);border-radius:4px;background:var(--bg);color:var(--text)">
                <option value="0">Sunday</option><option value="1">Monday</option><option value="2">Tuesday</option>
                <option value="3">Wednesday</option><option value="4">Thursday</option><option value="5">Friday</option><option value="6">Saturday</option>
              </select>
              of every <input id="r-month-int2" type="number" value="1" min="1" max="99"
                style="width:40px;text-align:center;padding:2px 4px;border:1px solid var(--input-border);border-radius:4px;background:var(--bg);color:var(--text)"> month(s)
            </label>
          </div>

          <!-- Yearly -->
          <div id="rp-yearly" style="display:none;font-size:0.82rem;margin-bottom:8px">
            Every <input id="r-yearly-int" type="number" value="1" min="1" max="10"
              style="width:40px;text-align:center;padding:2px 4px;border:1px solid var(--input-border);border-radius:4px;background:var(--bg);color:var(--text)"> year(s)
            on <input id="r-yearly-label" type="text" readonly
              style="width:64px;padding:2px 5px;border:1px solid var(--input-border);border-radius:4px;background:var(--bg);color:var(--text);cursor:default">
          </div>

          <!-- Range of Recurrence -->
          <div style="border-top:1px solid var(--border-soft);padding-top:8px;margin-top:4px">
            <div style="font-size:0.72rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px">Range of Recurrence</div>
            <!-- 3-col grid: [radio 18px] [label 68px] [input auto] -->
            <div style="display:grid;grid-template-columns:18px 68px auto;gap:6px;align-items:center;font-size:0.82rem">
              <span></span>
              <span style="color:var(--text-muted)">Start:</span>
              <input id="r-range-start" type="date"
                style="padding:2px 5px;border:1px solid var(--input-border);border-radius:4px;background:var(--bg);color:var(--text)">

              <input type="radio" id="r-et-date" name="r-end-type" value="date" checked
                style="margin:0;justify-self:center;cursor:pointer;accent-color:var(--accent)">
              <label for="r-et-date" style="margin:0;cursor:pointer">End by:</label>
              <input id="r-end-date" type="date"
                style="padding:2px 5px;border:1px solid var(--input-border);border-radius:4px;background:var(--bg);color:var(--text)">

              <input type="radio" id="r-et-count" name="r-end-type" value="count"
                style="margin:0;justify-self:center;cursor:pointer;accent-color:var(--accent)">
              <label for="r-et-count" style="margin:0;cursor:pointer">End after:</label>
              <span style="display:flex;align-items:center;gap:4px">
                <input id="r-end-count" type="number" value="10" min="1" max="999"
                  style="width:50px;text-align:center;padding:2px 4px;border:1px solid var(--input-border);border-radius:4px;background:var(--bg);color:var(--text)">
                occurrences
              </span>

              <input type="radio" id="r-et-never" name="r-end-type" value="never"
                style="margin:0;justify-self:center;cursor:pointer;accent-color:var(--accent)">
              <label for="r-et-never" style="grid-column:span 2;margin:0;cursor:pointer">No end date</label>
            </div>
          </div>
        </div><!-- end #recur-panel -->
      </div><!-- end .modal-right -->

    </div><!-- end .modal-body -->
  </div>
</div>

<!-- Recurrence Action Overlay (delete/edit this-or-all) -->
<div id="recur-action-overlay" class="modal-overlay" style="display:none">
  <div class="modal" style="width:320px">
    <h2 id="recur-action-title">Recurring Event</h2>
    <p id="recur-action-msg" style="font-size:0.88rem;color:var(--text-muted);margin:0 0 18px"></p>
    <div class="modal-actions">
      <button class="btn-cancel" id="recur-action-cancel">Cancel</button>
      <button class="btn-save"   id="recur-action-single">This occurrence</button>
      <button class="btn-delete" id="recur-action-all">All occurrences</button>
    </div>
  </div>
</div>


<!-- New Calendar Modal -->
<div id="cal-name-overlay" class="modal-overlay" style="display:none">
  <div class="modal" style="width:340px">
    <h2 id="cal-modal-title">New Calendar</h2>
    <label>Name</label>
    <input type="text" id="new-cal-name" placeholder="e.g. Work, Personal" maxlength="50">
    <label style="margin-top:13px">Calendar Color</label>
    <div class="color-row" id="cal-color-row"></div>
    <label style="display:flex;align-items:center;gap:8px;margin-top:16px;cursor:pointer">
      <input type="checkbox" id="new-cal-work-enable" style="width:15px;height:15px;cursor:pointer;accent-color:var(--accent)">
      <span>Enable work hours shading</span>
      <span style="font-size:0.72rem;color:var(--text-muted);font-weight:400">(shades off-hours in week/day view)</span>
    </label>
    <div id="new-cal-work-fields" style="display:none;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px">
      <div>
        <label style="margin-top:0">Work Start</label>
        <input type="time" id="new-cal-work-start" value="09:00">
      </div>
      <div>
        <label style="margin-top:0">Work End</label>
        <input type="time" id="new-cal-work-end" value="17:00">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="cal-name-cancel">Cancel</button>
      <button class="btn-save" id="cal-name-save">Create</button>
    </div>
  </div>
</div>

<!-- Group Name Modal -->
<div id="group-name-overlay" class="modal-overlay" style="display:none">
  <div class="modal" style="width:320px">
    <h2 id="group-modal-title">New Group</h2>
    <label>Group Name</label>
    <input type="text" id="group-name-input" placeholder="e.g. Work, Personal" maxlength="50">
    <div class="modal-actions">
      <button class="btn-cancel" id="group-name-cancel">Cancel</button>
      <button class="btn-save" id="group-name-save">Create</button>
    </div>
  </div>
</div>

<!-- Settings Panel -->
<div id="settings-overlay" class="settings-overlay" style="display:none">
  <div class="settings-panel">
    <h2>&#9881; Settings</h2>
    <div class="settings-group">
      <label>Appearance</label>
      <div style="display:flex;align-items:center;gap:10px">
        <button id="theme-btn" style="background:none;border:1px solid var(--input-border);border-radius:6px;padding:5px 9px;cursor:pointer;font-size:1rem;line-height:1;transition:all .15s" title="Toggle light/dark theme">&#127769;</button>
        <span id="theme-label" style="font-size:0.82rem;color:var(--text)">Light Mode</span>
      </div>
    </div>
    <div class="settings-group">
      <label>Main Color</label>
      <div class="settings-color-row">
        <input type="color" id="settings-main-color">
        <input type="text" id="settings-main-hex" maxlength="7" placeholder="#4f46e5">
      </div>
    </div>
    <div class="settings-group">
      <label>Accent Hover Color</label>
      <div class="settings-color-row">
        <input type="color" id="settings-accent-hover-color">
        <input type="text" id="settings-accent-hover-hex" maxlength="7" placeholder="#ede9fe">
      </div>
    </div>
    <div class="settings-actions">
      <button class="btn-reset" id="settings-reset">Reset</button>
      <button class="btn-cancel" id="settings-cancel">Cancel</button>
      <button class="btn-save" id="settings-save">Save</button>
    </div>
  </div>
</div>

<!-- Event hover popover -->
<div id="ev-popover" class="ev-popover"></div>

<script>
const COLORS = ['#4f46e5','#0ea5e9','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6'];

// ── State ────────────────────────────────────────────────────────────────────
let events = [];
let calendars = [];
let calendarGroups = [];
let openCalendarIds = [];       // visible calendars (max 5)
let primaryCalendarId = null;   // receives new events
let selectedCalId = null;       // calendar whose events are highlighted
let pendingCommand = null;
let editingCalId = null;
let editingCalColor = null;     // color being edited in calendar modal
let addCalGroupId = null;
let editingGroupId = null;
let view = 'week', weekDays = 7;
let cur = new Date(), today = new Date();
let editingId = null, dragEv = null, dragOffset = 0;
let resizeEv = null, resizeEdge = null, resizeEl = null, resizeCol = null;
let resizeOrigStart = '', resizeOrigEnd = '';
let selColor = COLORS[0];
let isAllDay = false;
let recurActive    = false;
let editingRecurDate = null;   // date string of virtual occurrence being edited/deleted
let editingRecurEv   = null  // full event object of the virtual occurrence being edited
const DOW_LABELS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

// Theme persistence
const THEME_STORAGE_KEY = 'accessCalendarTheme';
let darkMode = false;

function readSavedThemePreference() {
  try {
    const v = localStorage.getItem(THEME_STORAGE_KEY);
    if (v === 'dark') return true;
    if (v === 'light') return false;
  } catch (e) {}
  return false;
}

function saveThemePreference(isDark) {
  try {
    localStorage.setItem(THEME_STORAGE_KEY, isDark ? 'dark' : 'light');
  } catch (e) {}
}

function getSavedThemePreference() {
  try {
    const v = localStorage.getItem(THEME_STORAGE_KEY);
    if (v === 'dark' || v === 'light') return v;
  } catch (e) {}
  return darkMode ? 'dark' : 'light';
}

window.getSavedThemePreference = getSavedThemePreference;

// ── Access detection ──────────────────────────────────────────────────────────
const inAccess = !!(window.chrome && window.chrome.webview);
const standalone = !inAccess;

// ── VBA Bridge ───────────────────────────────────────────────────────────────
function getPendingCommand() { return pendingCommand != null ? JSON.stringify(pendingCommand) : null; }
function clearPendingCommand() { pendingCommand = null; setStatus('idle'); }
function queueCommand(cmd) {
  pendingCommand = cmd;
  setStatus('pending', 'Saving\u2026');
  if (window.chrome && window.chrome.webview)
    window.chrome.webview.postMessage(JSON.stringify(cmd));
}

// ── Primary data entry point (called by VBA) ──────────────────────────────────
window.loadData = function(json) {
  try {
    const d = JSON.parse(json);
    calendars      = d.calendars      || [];
    calendarGroups = d.calendarGroups  || [];
    events         = d.appointments   || [];
    
    const storedTheme = getSavedThemePreference();
    if (storedTheme === 'dark') {
      darkMode = true;
    } else if (storedTheme === 'light') {
      darkMode = false;
    } else if (typeof d.darkMode === 'boolean') {
      darkMode = d.darkMode;
    } else {
      darkMode = false;
    }
    applyTheme(darkMode, false);
    // Restore open calendars and primary
    if (Array.isArray(d.openCalendarIds) && d.openCalendarIds.length) {
      openCalendarIds = d.openCalendarIds.map(String).filter(id => calendars.some(c => String(c.id) === id));
    }
    const incomingPrimary = d.primaryCalendarId ? String(d.primaryCalendarId) : (d.activeCalendarId ? String(d.activeCalendarId) : null);
    if (incomingPrimary && calendars.some(c => String(c.id) === incomingPrimary)) {
      primaryCalendarId = incomingPrimary;
    } else if (!primaryCalendarId && calendars.length) {
      primaryCalendarId = String(calendars[0].id);
    } else if (primaryCalendarId && !calendars.some(c => String(c.id) === String(primaryCalendarId))) {
      primaryCalendarId = calendars.length ? String(calendars[0].id) : null;
    }
    // Ensure primary is in the open set; default to primary if open set is empty
    if (!openCalendarIds.length && primaryCalendarId) {
      openCalendarIds = [primaryCalendarId];
    }
    if (primaryCalendarId && !openCalendarIds.includes(primaryCalendarId)) {
      openCalendarIds.unshift(primaryCalendarId);
    }
    renderSidebar();
    render();
    setStatus('idle');
  } catch(e) {
    setStatus('error', 'Bad data from Access');
    console.error(e);
  }
};

// ── Backward-compat shim (old VBA still calling loadEventsFromAccess) ─────────
function loadEventsFromAccess(eventsArg) {
  try {
    events = Array.isArray(eventsArg) ? eventsArg : JSON.parse(eventsArg);
    setStatus('idle');
    render();
  } catch(e) { setStatus('error', 'Bad data from Access'); console.error(e); }
}

// ── Filtered events for active calendar ──────────────────────────────────────
function calEvents() {
  if (!openCalendarIds.length) return events;
  return events.filter(e => openCalendarIds.includes(String(e.calendarId)));
}

// ── Multi-calendar helpers ───────────────────────────────────────────────────
function isCalendarOpen(id) {
  return openCalendarIds.includes(String(id));
}

function getCalendarColor(calId) {
  const cal = calendars.find(c => String(c.id) === String(calId));
  return (cal && cal.color) || COLORS[0];
}

function eventDisplayColor(ev) {
  const cal = calendars.find(c => String(c.id) === String(ev.calendarId));
  return (cal && cal.color) ? cal.color : (ev.color || COLORS[0]);
}
function eventAccentColor(ev) {
  // Use the appointment's own color for the accent strip; darken it for contrast
  const c = ev.color || COLORS[0];
  return darkenColor(c, 40);
}
function isEvSelected(ev) {
  return selectedCalId && String(ev.calendarId) === String(selectedCalId);
}
function darkenColor(hex, amount) {
  let c = hex.replace('#','');
  if (c.length===3) c=c[0]+c[0]+c[1]+c[1]+c[2]+c[2];
  const r=Math.max(0,parseInt(c.substring(0,2),16)-amount);
  const g=Math.max(0,parseInt(c.substring(2,4),16)-amount);
  const b=Math.max(0,parseInt(c.substring(4,6),16)-amount);
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function toggleCalendar(id) {
  id = String(id);
  const idx = openCalendarIds.indexOf(id);
  if (idx >= 0) {
    if (openCalendarIds.length <= 1) return; // don't close the last one
    openCalendarIds.splice(idx, 1);
    if (primaryCalendarId === id) primaryCalendarId = openCalendarIds[0];
    if (selectedCalId === id) selectedCalId = null;
  } else {
    if (openCalendarIds.length >= 5) return; // max 5 overlay
    openCalendarIds.push(id);
  }
  renderSidebar();
  render();
  notifyOpenCalendars();
}

function setPrimaryCalendar(id) {
  id = String(id);
  if (!openCalendarIds.includes(id)) return;
  primaryCalendarId = id;
  renderSidebar();
  renderCalTabs();
}

function notifyOpenCalendars() {
  queueCommand({
    action: 'setOpenCalendars',
    calendarIds: openCalendarIds.join(','),
    primaryId: primaryCalendarId
  });
}

// ── Status bar ───────────────────────────────────────────────────────────────
function setStatus(type, msg) {
  const el = document.getElementById('status-bar');
  const labels = { idle: '\u25CF Connected', pending: 'Saving\u2026', error: 'Error' };
  el.className = 'status-bar ' + type;
  el.textContent = msg || labels[type] || type;
}
setStatus('idle');

// ── Sidebar ──────────────────────────────────────────────────────────────────

// ── Sidebar collapse ──────────────────────────────────────────────────────
document.getElementById('sidebar-toggle-btn').addEventListener('click', function() {
  const sidebar = document.getElementById('sidebar');
  const collapsed = sidebar.classList.toggle('collapsed');
  this.textContent = collapsed ? '\u203A' : '\u2039';   // › / ‹
  this.title       = collapsed ? 'Expand sidebar' : 'Collapse sidebar';
});
function calItemHtml(c) {
  const isOpen = openCalendarIds.includes(String(c.id));
  const isPrimary = String(c.id) === String(primaryCalendarId);
  const dotColor = c.color || COLORS[0];
  return `<div class="cal-item${isOpen?' active':''}${isPrimary?' primary':''}" data-id="${c.id}" draggable="true">
    <input type="checkbox" class="cal-chk" id="calr-${c.id}" value="${c.id}"${isOpen?' checked':''}>
    <span class="cal-color-dot" style="background:${dotColor}"></span>
    <label class="cal-item-name" for="calr-${c.id}" title="${esc(c.name)}">${esc(c.name)}</label>
    <button class="cal-edit-btn" data-id="${c.id}" title="Edit calendar">&#9998;</button>
    <button class="cal-del-btn" data-id="${c.id}" title="Delete calendar">\u2715</button>
  </div>`;
}

function renderCalTabs() {
  const bar = document.getElementById('cal-tabs');
  if (openCalendarIds.length <= 1) { bar.innerHTML = ''; return; }
  bar.innerHTML = openCalendarIds.map(cid => {
    const cal = calendars.find(c => String(c.id) === String(cid));
    if (!cal) return '';
    const isPrimary = String(cid) === String(primaryCalendarId);
    const isSelected = String(cid) === String(selectedCalId);
    const color = cal.color || '#4f46e5';
    return `<span class="cal-tab${isPrimary ? ' primary' : ''}${isSelected && !isPrimary ? ' active' : ''}" data-id="${cal.id}">`
      + `<span class="cal-tab-dot" style="background:${color}"></span>`
      + `<span class="cal-tab-name">${esc(cal.name)}</span>`
      + `<span class="cal-tab-close" title="Hide calendar">&times;</span>`
      + `</span>`;
  }).join('');
  bar.querySelectorAll('.cal-tab').forEach(tab => {
    tab.querySelector('.cal-tab-name').addEventListener('click', () => {
      selectedCalId = String(tab.dataset.id) === String(selectedCalId) ? null : String(tab.dataset.id);
      setPrimaryCalendar(tab.dataset.id);
      render();
    });
    tab.querySelector('.cal-tab-close').addEventListener('click', e => { e.stopPropagation(); toggleCalendar(tab.dataset.id); });
  });
}

function renderSidebar() {
  const list = document.getElementById('cal-list');
  if (!calendars.length && !calendarGroups.length) {
    list.innerHTML = '<div class="cal-empty">No calendars yet.<br>Click + to add a group.</div>';
    return;
  }
  let html = '';
  // Render each group
  calendarGroups.forEach(g => {
    const gCals = calendars.filter(c => String(c.groupId) === String(g.id));
    html += `<div class="cal-group" data-group-id="${g.id}">
      <div class="cal-group-header" data-group-id="${g.id}">
        <span class="cal-group-arrow">\u25BE</span>
        <span class="cal-group-name" title="${esc(g.name)}">${esc(g.name)}</span>
        <button class="cal-group-add-btn" data-group-id="${g.id}" title="Add calendar to group">+</button>
        <div class="cal-group-actions">
          <button class="grp-edit-btn" data-group-id="${g.id}" title="Rename group">&#9998;</button>
          <button class="grp-del-btn" data-group-id="${g.id}" title="Delete group">\u2715</button>
        </div>
      </div>
      <div class="cal-group-body">
        ${gCals.length ? gCals.map(c => calItemHtml(c)).join('') : '<div class="cal-empty" style="padding:8px 12px;font-size:0.72rem">Drop calendars here</div>'}
      </div>
    </div>`;
  });
  // Ungrouped calendars
  const ungrouped = calendars.filter(c => !c.groupId || !calendarGroups.some(g => String(g.id) === String(c.groupId)));
  if (ungrouped.length || !calendarGroups.length) {
    html += `<div class="cal-group" data-group-id="">
      <div class="cal-group-header" data-group-id="">
        <span class="cal-group-arrow">\u25BE</span>
        <span class="cal-group-name">Ungrouped</span>
      </div>
      <div class="cal-group-body">
        ${ungrouped.length ? ungrouped.map(c => calItemHtml(c)).join('') : '<div class="cal-empty" style="padding:8px 12px;font-size:0.72rem">No ungrouped calendars</div>'}
      </div>
    </div>`;
  }
  list.innerHTML = html;
  // Wire calendar item events
  list.querySelectorAll('.cal-chk').forEach(chk => {
    chk.addEventListener('change', () => toggleCalendar(chk.value));
  });
  list.querySelectorAll('.cal-del-btn').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); deleteCalendar(btn.dataset.id); });
  });
  list.querySelectorAll('.cal-edit-btn').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); openCalEditModal(btn.dataset.id); });
  });
  list.querySelectorAll('.cal-item').forEach(item => {
    item.addEventListener('click', e => {
      if (e.target.closest('.cal-del-btn') || e.target.closest('.cal-edit-btn') || e.target.tagName === 'LABEL' || e.target.tagName === 'INPUT') return;
      // Click on the row sets this as primary (or opens it)
      if (openCalendarIds.includes(String(item.dataset.id))) {
        setPrimaryCalendar(item.dataset.id);
      } else {
        toggleCalendar(item.dataset.id);
      }
    });
    // Drag start for calendar items (between groups)
    item.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/cal-id', item.dataset.id);
      e.dataTransfer.effectAllowed = 'move';
      requestAnimationFrame(() => item.classList.add('dragging'));
    });
    item.addEventListener('dragend', () => item.classList.remove('dragging'));
  });
  // Wire group header events
  list.querySelectorAll('.cal-group-header').forEach(hdr => {
    hdr.addEventListener('click', e => {
      if (e.target.closest('.cal-group-actions') || e.target.closest('.cal-group-add-btn')) return;
      const body = hdr.nextElementSibling;
      const collapsed = hdr.classList.toggle('collapsed');
      body.classList.toggle('collapsed', collapsed);
    });
  });
  list.querySelectorAll('.grp-edit-btn').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); openGroupModal(btn.dataset.groupId); });
  });
  list.querySelectorAll('.grp-del-btn').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); deleteGroup(btn.dataset.groupId); });
  });
  list.querySelectorAll('.cal-group-add-btn').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); openCalModal(btn.dataset.groupId); });
  });
  // Wire group drag-drop targets
  list.querySelectorAll('.cal-group').forEach(grp => {
    grp.addEventListener('dragover', e => {
      if (!e.dataTransfer.types.includes('text/cal-id')) return;
      e.preventDefault();
      grp.classList.add('drag-over');
    });
    grp.addEventListener('dragleave', e => {
      if (!grp.contains(e.relatedTarget)) grp.classList.remove('drag-over');
    });
    grp.addEventListener('drop', e => {
      e.preventDefault();
      grp.classList.remove('drag-over');
      const calId = e.dataTransfer.getData('text/cal-id');
      if (!calId) return;
      const groupId = grp.dataset.groupId || '';
      moveCalendarToGroup(calId, groupId);
    });
  });
}

function switchCalendar(id) {
  // Legacy — now just toggles and sets primary
  if (!openCalendarIds.includes(String(id))) toggleCalendar(id);
  setPrimaryCalendar(id);
}

function deleteCalendar(id) {
  const cal = calendars.find(c => String(c.id) === String(id));
  const name = cal ? cal.name : 'this calendar';
  if (!confirm('Delete "' + name + '" and all its appointments?')) return;
  // Optimistic UI update
  calendars = calendars.filter(c => String(c.id) !== String(id));
  events    = events.filter(e => String(e.calendarId) !== String(id));
  openCalendarIds = openCalendarIds.filter(oid => String(oid) !== String(id));
  if (String(primaryCalendarId) === String(id)) {
    primaryCalendarId = openCalendarIds.length ? openCalendarIds[0] : (calendars.length ? String(calendars[0].id) : null);
    if (primaryCalendarId && !openCalendarIds.includes(primaryCalendarId)) openCalendarIds.push(primaryCalendarId);
  }
  notifyOpenCalendars();
  renderSidebar();
  render();
  queueCommand({ action: 'deleteCalendar', id: String(id) });
}

// ── Add-group modal ──────────────────────────────────────────────────────────
function openGroupModal(groupId) {
  editingGroupId = groupId || null;
  if (editingGroupId) {
    const g = calendarGroups.find(g => String(g.id) === String(editingGroupId));
    document.getElementById('group-modal-title').textContent = 'Rename Group';
    document.getElementById('group-name-save').textContent = 'Save';
    document.getElementById('group-name-input').value = g ? g.name : '';
  } else {
    document.getElementById('group-modal-title').textContent = 'New Group';
    document.getElementById('group-name-save').textContent = 'Create';
    document.getElementById('group-name-input').value = '';
  }
  document.getElementById('group-name-overlay').style.display = 'flex';
  setTimeout(() => document.getElementById('group-name-input').focus(), 50);
}
document.getElementById('add-group-btn').onclick = () => openGroupModal();
document.getElementById('group-name-cancel').onclick = () => {
  document.getElementById('group-name-overlay').style.display = 'none';
};
document.getElementById('group-name-save').onclick = () => {
  const name = document.getElementById('group-name-input').value.trim();
  if (!name) { document.getElementById('group-name-input').focus(); return; }
  document.getElementById('group-name-overlay').style.display = 'none';
  if (editingGroupId) {
    const g = calendarGroups.find(g => String(g.id) === String(editingGroupId));
    if (g) g.name = name;
    renderSidebar();
    if (!standalone) queueCommand({ action: 'renameGroup', id: String(editingGroupId), name });
    editingGroupId = null;
  } else {
    if (standalone) {
      calendarGroups.push({ id: 'tmp_g_' + Date.now(), name });
      renderSidebar();
    } else {
      queueCommand({ action: 'addGroup', name });
    }
  }
};
document.getElementById('group-name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('group-name-save').click();
});
document.getElementById('group-name-overlay').onclick = e => {
  if (e.target === document.getElementById('group-name-overlay'))
    document.getElementById('group-name-overlay').style.display = 'none';
};

function deleteGroup(id) {
  const g = calendarGroups.find(g => String(g.id) === String(id));
  const name = g ? g.name : 'this group';
  if (!confirm('Delete group "' + name + '"? Calendars in this group will become ungrouped.')) return;
  calendarGroups = calendarGroups.filter(g => String(g.id) !== String(id));
  calendars.forEach(c => { if (String(c.groupId) === String(id)) c.groupId = ''; });
  renderSidebar();
  if (!standalone) queueCommand({ action: 'deleteGroup', id: String(id) });
}

function moveCalendarToGroup(calId, groupId) {
  const cal = calendars.find(c => String(c.id) === String(calId));
  if (!cal) return;
  if (String(cal.groupId || '') === String(groupId || '')) return;
  cal.groupId = groupId || '';
  renderSidebar();
  if (!standalone) queueCommand({ action: 'moveCalendarToGroup', calendarId: String(calId), groupId: String(groupId || '') });
}

function renderCalColorRow() {
  const row = document.getElementById('cal-color-row');
  row.innerHTML = '';
  COLORS.forEach(c => {
    const s = document.createElement('div');
    s.className = 'color-swatch' + (c === editingCalColor ? ' selected' : '');
    s.style.background = c;
    s.onclick = () => { editingCalColor = c; renderCalColorRow(); };
    row.appendChild(s);
  });
}

// ── Add/Edit calendar modal ──────────────────────────────────────────────────
function openCalModal(groupId) {
  editingCalId = null;
  addCalGroupId = groupId || '';
  editingCalColor = COLORS[0];
  document.getElementById('cal-modal-title').textContent = 'New Calendar';
  document.getElementById('cal-name-save').textContent = 'Create';
  document.getElementById('new-cal-name').value = '';
  document.getElementById('new-cal-work-enable').checked = false;
  document.getElementById('new-cal-work-fields').style.display = 'none';
  document.getElementById('new-cal-work-start').value = '09:00';
  document.getElementById('new-cal-work-end').value   = '17:00';
  renderCalColorRow();
  document.getElementById('cal-name-overlay').style.display = 'flex';
  setTimeout(() => document.getElementById('new-cal-name').focus(), 50);
}

function openCalEditModal(calId) {
  const cal = calendars.find(c => String(c.id) === String(calId));
  if (!cal) return;
  editingCalId = calId;
  addCalGroupId = null;
  editingCalColor = cal.color || COLORS[0];
  document.getElementById('cal-modal-title').textContent = 'Edit Calendar';
  document.getElementById('cal-name-save').textContent = 'Save';
  document.getElementById('new-cal-name').value = cal.name || '';
  const hasWork = !!(cal.workStart && cal.workEnd);
  document.getElementById('new-cal-work-enable').checked = hasWork;
  document.getElementById('new-cal-work-fields').style.display = hasWork ? 'grid' : 'none';
  document.getElementById('new-cal-work-start').value = cal.workStart || '09:00';
  document.getElementById('new-cal-work-end').value   = cal.workEnd   || '17:00';
  renderCalColorRow();
  document.getElementById('cal-name-overlay').style.display = 'flex';
  setTimeout(() => document.getElementById('new-cal-name').focus(), 50);
}

document.getElementById('new-cal-work-enable').addEventListener('change', function() {
  const fields = document.getElementById('new-cal-work-fields');
  fields.style.display = this.checked ? 'grid' : 'none';
});
document.getElementById('cal-name-cancel').onclick = () => {
  document.getElementById('cal-name-overlay').style.display = 'none';
  editingCalId = null; addCalGroupId = null;
};
document.getElementById('cal-name-save').onclick = () => {
  const name = document.getElementById('new-cal-name').value.trim();
  if (!name) { document.getElementById('new-cal-name').focus(); return; }
  const enabled = document.getElementById('new-cal-work-enable').checked;
  const ws = enabled ? document.getElementById('new-cal-work-start').value : '';
  const we = enabled ? document.getElementById('new-cal-work-end').value   : '';
  const calColor = editingCalColor || COLORS[0];
  document.getElementById('cal-name-overlay').style.display = 'none';
  if (editingCalId) {
    const cal = calendars.find(c => String(c.id) === String(editingCalId));
    if (cal) { cal.name = name; cal.workStart = ws; cal.workEnd = we; cal.color = calColor; }
    renderSidebar(); render();
    if (!standalone) queueCommand({ action: 'editCalendar', id: String(editingCalId), name, workStart: ws, workEnd: we, color: calColor });
    editingCalId = null;
  } else {
    const groupId = addCalGroupId || '';
    if (standalone) {
      const tmpId = 'tmp_' + Date.now();
      calendars.push({ id: tmpId, name, color: calColor, workStart: ws, workEnd: we, groupId });
      if (!primaryCalendarId) { primaryCalendarId = tmpId; openCalendarIds.push(tmpId); }
      renderSidebar();
    } else {
      queueCommand({ action: 'addCalendar', name, color: calColor, workStart: ws, workEnd: we, groupId });
    }
    addCalGroupId = null;
  }
};
document.getElementById('new-cal-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('cal-name-save').click();
});
document.getElementById('cal-name-overlay').onclick = e => {
  if (e.target === document.getElementById('cal-name-overlay')) {
    document.getElementById('cal-name-overlay').style.display = 'none';
    editingCalId = null; addCalGroupId = null;
  }
};

// ── All-day toggle ───────────────────────────────────────────────────────────
const alldayToggle = document.getElementById('allday-toggle');
const timeFields   = document.getElementById('time-fields');
alldayToggle.onclick = () => {
  isAllDay = !isAllDay;
  alldayToggle.classList.toggle('on', isAllDay);
  alldayToggle.setAttribute('aria-checked', isAllDay);
  timeFields.style.display = isAllDay ? 'none' : '';
  if (isAllDay) {
    document.getElementById('ev-start').value = '00:00';
    document.getElementById('ev-end').value   = '23:59';
  }
};
function setAllDay(val) {
  isAllDay = val;
  alldayToggle.classList.toggle('on', isAllDay);
  alldayToggle.setAttribute('aria-checked', isAllDay);
  timeFields.style.display = isAllDay ? 'none' : '';
}

// ── Theme toggle ─────────────────────────────────────────────────────────────
document.getElementById('theme-btn').onclick = () => {
  darkMode = !darkMode;
  applyTheme(darkMode, true);
  queueCommand({ action: 'setTheme', dark: darkMode });
};
function applyTheme(dark, persist = true) {
  darkMode = !!dark;
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : '');
  const btn = document.getElementById('theme-btn');
  if (btn) btn.textContent = dark ? '\u2600\uFE0F' : '\uD83C\uDF19';
  const lbl = document.getElementById('theme-label');
  if (lbl) lbl.textContent = dark ? 'Dark Mode' : 'Light Mode';
  if (persist) saveThemePreference(darkMode);
}

// ── Settings (color customization) ───────────────────────────────────────────
const COLOR_STORAGE_KEY = 'accessCalendarColors';

function loadSavedColors() {
  try {
    const raw = localStorage.getItem(COLOR_STORAGE_KEY);
    if (raw) {
      const colors = JSON.parse(raw);
      if (colors.accent) document.documentElement.style.setProperty('--accent', colors.accent);
      if (colors.accentHover) document.documentElement.style.setProperty('--accent-hover', colors.accentHover);
    }
  } catch (e) {}
}

function saveColors(accent, accentHover) {
  try {
    localStorage.setItem(COLOR_STORAGE_KEY, JSON.stringify({ accent, accentHover }));
  } catch (e) {}
}

function resetColors() {
  try { localStorage.removeItem(COLOR_STORAGE_KEY); } catch (e) {}
  document.documentElement.style.removeProperty('--accent');
  document.documentElement.style.removeProperty('--accent-hover');
}

function getCurrentAccent() {
  return getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
}
function getCurrentAccentHover() {
  return getComputedStyle(document.documentElement).getPropertyValue('--accent-hover').trim();
}

(function initSettings() {
  const btn       = document.getElementById('settings-btn');
  const overlay   = document.getElementById('settings-overlay');
  const mainPick  = document.getElementById('settings-main-color');
  const mainHex   = document.getElementById('settings-main-hex');

  const hoverHex  = document.getElementById('settings-accent-hover-hex');
  const saveBtn   = document.getElementById('settings-save');
  const cancelBtn = document.getElementById('settings-cancel');
  const resetBtn  = document.getElementById('settings-reset');

  function openSettings() {
    const accent = getCurrentAccent();
    const hover  = getCurrentAccentHover();
    mainPick.value  = accent;
    mainHex.value   = accent;
    hoverPick.value = hover;
    hoverHex.value  = hover;
    overlay.style.display = 'flex';
  }

  function closeSettings() { overlay.style.display = 'none'; }

  // Sync pickers ↔ text inputs with live preview
  mainPick.addEventListener('input', () => {
    mainHex.value = mainPick.value;
    document.documentElement.style.setProperty('--accent', mainPick.value);
  });
  mainHex.addEventListener('input', () => {
    if (/^#[0-9a-f]{6}$/i.test(mainHex.value)) {
      mainPick.value = mainHex.value;
      document.documentElement.style.setProperty('--accent', mainHex.value);
    }
  });
  hoverPick.addEventListener('input', () => {
    hoverHex.value = hoverPick.value;
    document.documentElement.style.setProperty('--accent-hover', hoverPick.value);
  });
  hoverHex.addEventListener('input', () => {
    if (/^#[0-9a-f]{6}$/i.test(hoverHex.value)) {
      hoverPick.value = hoverHex.value;
      document.documentElement.style.setProperty('--accent-hover', hoverHex.value);
    }
  });

  btn.addEventListener('click', openSettings);
  cancelBtn.addEventListener('click', () => {
    loadSavedColors();   // revert live preview
    closeSettings();
  });
  saveBtn.addEventListener('click', () => {
    saveColors(mainPick.value, hoverPick.value);
    closeSettings();
  });

    openSettings();      // refresh inputs with defaults
  });
  overlay.addEventListener('click', e => {
    if (e.target === overlay) {
      loadSavedColors();
      closeSettings();
    }
  });

  // Apply saved colours on load

})();

document.getElementById('modal-save').onclick = () => {
    const title   = document.getElementById('ev-title').value.trim() || 'No title'
    const date    = document.getElementById('ev-date').value
    const endDate = document.getElementById('ev-end-date').value
    const start   = document.getElementById('ev-start').value
    const end     = document.getElementById('ev-end').value
    const notes   = document.getElementById('ev-notes').value.trim()
    const allDay  = isAllDay
    if (!date) return
    const calId = document.getElementById('ev-calendar').value || primaryCalendarId
    const rd    = getRecurData()

    // ── Recurring-occurrence reschedule ──────────────────────────────────────
    // When the user opens a single occurrence of a recurring series and clicks
    // Save, ask whether they mean THIS occurrence only or ALL occurrences.
    //   "This occurrence"  → commitRescheduleOne():
    //       1. Adds the original date to master's RecurExceptions (suppresses it)
    //       2. Creates a new standalone appointment at the new date/time
    //   "All occurrences"  → doSaveAll() updates the master record as before
    if (editingRecurDate !== null && editingId !== null && editingRecurEv !== null) {
        overlay.style.display = 'none'
        showRecurActionOverlay(
            'Edit Recurring Event',
            'Update only this occurrence, or every event in the series?',
            () => {
                // This occurrence — reschedule to the (possibly changed) date/time
                commitRescheduleOne(
                    editingRecurEv,
                    date, start, end,
                    { title, color: selColor, notes, allDay,
                      reminderMinutes: parseInt(document.getElementById('ev-reminder').value, 10) }
                )
            },
            () => {
                // All occurrences — update the master record as before
                doSaveAll()
            },
            'This occurrence',
            'All occurrences'
        )
        return
    }

    doSaveAll()

    // ── Helper: save / update the master record (existing behaviour) ─────────
    function doSaveAll() {
        if (standalone) {
            if (editingId !== null) {
                const ev = events.find(e => e.id === editingId)
                if (ev) Object.assign(ev, {title,date,endDate,start,end,notes,allDay,color:selColor,...rd})
            } else {
                events.push({id:Date.now(),title,date,endDate,start,end,notes,allDay,color:selColor,calendarId:calId,...rd})
            }
        } else {
            queueCommand({ action:'save', id: editingId||0, calendarId:calId,
                title, date, endDate, start, end, notes, allDay, color:selColor,
                reminderMinutes: parseInt(document.getElementById('ev-reminder').value, 10),
                recurType:         rd.recurType,
                recurInterval:     rd.recurInterval    || 1,
                recurDaysOfWeek:   rd.recurDaysOfWeek  || '',
                recurMonthlyMode:  rd.recurMonthlyMode || 'day',
                recurMonthDay:     rd.recurMonthDay    || 1,
                recurMonthWeek:    rd.recurMonthWeek   || 1,
                recurMonthDOW:     rd.recurMonthDOW    || 0,
                recurEndType:      rd.recurEndType     || 'never',
                recurEndDate:      rd.recurEndDate     || '',
                recurCount:        rd.recurCount       || 0,
                recurRangeStart:   rd.recurRangeStart  || date })
            // Optimistic clear stale events — keep UI responsive while VBA reloads
            if (editingId !== null) {
                const hadRecurrence = events.some(e => String(e.recurMasterId) === String(editingId))
                events = events.filter(e => e.id !== editingId && String(e.recurMasterId) !== String(editingId))
                // For non-recurring edits OR converting recurring→single: keep event visible
                // with updated values as a placeholder while VBA reloads
                if (!hadRecurrence || rd.recurType === 'none')
                    events.push({id:`tmp${Date.now()}`,title,date,endDate,start,end,
                                 notes,allDay,color:selColor,calendarId:calId,recurType:'none'})
                // For recurring→still-recurring edits: no placeholder; VBA must rebuild all occurrences
            } else {
                events.push({id:`tmp${Date.now()}`,title,date,endDate,start,end,
                             notes,allDay,color:selColor,calendarId:calId,...rd})
            }
        }
        overlay.style.display = 'none'
        render()
    }
}



// ── Drag ─────────────────────────────────────────────────────────────────────
function commitMove(ev, newDate, newStart, newEnd) {
  let newEndDate = '';
  if (ev.endDate && ev.endDate > ev.date) {
    const durMs   = new Date(ev.endDate+'T00:00:00') - new Date(ev.date+'T00:00:00');
    newEndDate    = fmt(new Date(new Date(newDate+'T00:00:00').getTime() + durMs));
  }
  if (standalone) {
    ev.date=newDate; ev.endDate=newEndDate; ev.start=newStart; ev.end=newEnd; render();
  } else {
    queueCommand({action:'move',id:ev.id,date:newDate,endDate:newEndDate,start:newStart,end:newEnd});
    ev.date=newDate; ev.endDate=newEndDate; ev.start=newStart; ev.end=newEnd; render();
  }
}


// commitResize: only changes start/end time, not the date.
// Handles recurring events by sending recurMasterId so VBA updates the master record.
function commitResize(ev, newStart, newEnd) {
  if (standalone) {
    ev.start = newStart; ev.end = newEnd; render();
  } else {
    const masterId = ev.recurMasterId != null ? String(ev.recurMasterId) : '';
    queueCommand({action:'resize', id:String(ev.id), masterId:masterId, start:newStart, end:newEnd});
    ev.start = newStart; ev.end = newEnd; render();
  }
}

// commitRescheduleOne: exempts one occurrence from its recurring series and
// books a new standalone appointment with the modified date/time.
// overrides = { title, color, notes, allDay } — supplied when called from the modal
// so user-edited values flow through into the new standalone record.
function commitRescheduleOne(ev, newDate, newStart, newEnd, overrides = {}) {
    const masterId      = ev.recurMasterId != null ? ev.recurMasterId : ev.id
    const title         = overrides.title         !== undefined ? overrides.title         : ev.title
    const color         = overrides.color         !== undefined ? overrides.color         : (ev.color  || '#4f46e5')
    const notes         = overrides.notes         !== undefined ? overrides.notes         : (ev.notes  || '')
    const allDay        = overrides.allDay        !== undefined ? overrides.allDay        : (ev.allDay || false)
    const reminderMins  = overrides.reminderMinutes !== undefined ? overrides.reminderMinutes
                          : (ev.reminderMinutes !== undefined ? ev.reminderMinutes : -1)
    if (standalone) {
        events = events.filter(e => !(String(e.recurMasterId) === String(masterId) && e.date === ev.date))
        events.push({
            id: Date.now(), calendarId: ev.calendarId,
            title, date: newDate, endDate: '', start: newStart, end: newEnd,
            allDay, color, notes, recurType: 'none', isRecurring: false,
            reminderMinutes: reminderMins
        })
        render()
    } else {
        queueCommand({
            action: 'rescheduleOccurrence',
            masterId: String(masterId),
            originalDate: ev.date,
            newDate, start: newStart, end: newEnd,
            title, calendarId: String(ev.calendarId),
            color, notes,
            allDay: allDay ? true : false,
            reminderMinutes: reminderMins
        })
        // Optimistic: hide the virtual occurrence immediately while VBA rebuilds
        events = events.filter(e => !(String(e.recurMasterId) === String(masterId) && e.date === ev.date))
        render()
    }
}
