<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar</title>
<link rel="stylesheet" href="css/calendar.css">
</head>
<body>
<header>
  <!-- Left: app title -->
  <div class="hdr-left">
    <h1>Access Calendar</h1>
  </div>
  <!-- Center: month/year navigator -->
  <div class="hdr-center" style="position:relative">
    <button class="nav-btn" id="prev-btn">&#8249;</button>
    <span id="current-label"></span>
    <button class="nav-btn" id="next-btn">&#8250;</button>
    <!-- Month/Year picker popup -->
    <div class="monthpicker-popup" id="monthpicker">
      <div class="mp-row">
        <label>Month</label>
        <select id="mp-month"></select>
      </div>
      <div class="mp-row">
        <label>Year</label>
        <input type="number" id="mp-year" min="1900" max="2100">
      </div>
      <div class="mp-actions">
        <button class="btn-cancel" id="mp-cancel">Cancel</button>
        <button class="btn-save" id="mp-go">Go</button>
      </div>
    </div>
  </div>
  <!-- Right: view controls + theme + status -->
  <div class="hdr-right">
    <button id="today-btn">Today</button>
    <div id="week-toggle-wrap" class="week-toggle" style="display:none">
      <button id="w5-btn">5 days</button>
      <button id="w7-btn" class="active">7 days</button>
    </div>
    <div class="view-tabs">
      <button class="view-tab" data-view="month">Month</button>
      <button class="view-tab" data-view="week">Week</button>
      <button class="view-tab" data-view="day">Day</button>
    </div>
    <span id="status-bar" class="idle">&#9679; Connected</span>
  </div>
</header>

<div class="app-wrapper">
  <!-- Left sidebar: calendar list -->
  <nav class="sidebar" id="sidebar">
    <!-- Collapse / expand toggle -->
    <button id="sidebar-toggle-btn" class="sidebar-toggle-btn" title="Collapse sidebar">&#8249;</button>
    <!-- All sidebar content — fades out when collapsed -->
    <div class="sidebar-content">
      <!-- Mini-month calendar -->
      <div class="mini-cal">
        <div class="mini-cal-nav">
          <button class="mini-nav-btn" id="mini-prev" title="Previous month">&#8249;</button>
          <span class="mini-cal-title" id="mini-cal-title"></span>
          <button class="mini-nav-btn" id="mini-next" title="Next month">&#8250;</button>
        </div>
        <div class="mini-grid" id="mini-cal-grid"></div>
      </div>
      <!-- Calendar list -->
      <div class="sidebar-header">
        <span>Calendars</span>
        <button class="sidebar-add-btn" id="add-group-btn" title="New Group">+</button>
      </div>
      <div class="cal-list" id="cal-list">
        <div class="cal-empty">No calendars yet</div>
      </div>
      <button id="settings-btn" title="Settings">&#9881; Settings</button>
    </div><!-- end .sidebar-content -->
  </nav>
  <!-- Calendar main (tabs + calendar area) -->
  <div class="cal-main">
    <!-- Calendar tab bar -->
    <div id="cal-tabs"></div>
    <!-- Main calendar area -->
    <div id="cal"></div>
  </div>
</div>

<!-- Appointment Modal -->
<div id="modal-overlay" class="modal-overlay" style="display:none">
  <div class="modal">
    <h2 id="modal-title">New Appointment</h2>
    <div class="modal-body">

      <!-- ── LEFT COLUMN ─────────────────────────────────────────── -->
      <div class="modal-left">
        <label>Calendar</label>
        <select id="ev-calendar"></select>

        <label>Title</label>
        <input type="text" id="ev-title" placeholder="Appointment title">

        <div class="modal-row-2" style="margin-top:13px">
          <div>
            <label style="margin-top:0">Date</label>
            <input type="date" id="ev-date">
          </div>
          <div>
            <label style="margin-top:0">End Date <span style="font-size:0.72rem;color:var(--text-muted);font-weight:400">(multi-day)</span></label>
            <input type="date" id="ev-end-date">
          </div>
        </div>

        <label style="display:flex;align-items:center;justify-content:space-between;margin-top:14px">
          <span>All Day</span>
          <div id="allday-toggle" class="toggle-switch" role="switch" aria-checked="false">
            <div class="toggle-thumb"></div>
          </div>
        </label>

        <div id="time-fields">
          <div class="modal-row-2">
            <div>
              <label>Start Time</label>
              <input type="time" id="ev-start">
            </div>
            <div>
              <label>End Time</label>
              <input type="time" id="ev-end">
            </div>
          </div>
        </div>

        <label>Notes</label>
        <textarea id="ev-notes" placeholder="Add notes" rows="2"></textarea>

        <label>Location</label>
        <input type="text" id="ev-location" placeholder="Add location">

        <label>Color</label>
        <div class="color-row" id="color-row"></div>

        <label>Reminder</label>
        <select id="ev-reminder">
          <option value="-1">None</option>
          <option value="0">0 minutes</option>
          <option value="5">5 minutes</option>
          <option value="10">10 minutes</option>
          <option value="15" selected>15 minutes</option>
          <option value="30">30 minutes</option>
          <option value="60">1 hour</option>
          <option value="120">2 hours</option>
          <option value="180">3 hours</option>
          <option value="240">4 hours</option>
          <option value="300">5 hours</option>
          <option value="360">6 hours</option>
          <option value="420">7 hours</option>
          <option value="480">8 hours</option>
          <option value="540">9 hours</option>
          <option value="600">10 hours</option>
          <option value="660">11 hours</option>
          <option value="720">0.5 days</option>
          <option value="1080">18 hours</option>
          <option value="1440">1 day</option>
          <option value="2880">2 days</option>
        </select>

        <div style="margin-top:14px;border-top:1px solid var(--border-soft);padding-top:10px;display:flex;align-items:center;justify-content:space-between">
          <span style="font-size:0.78rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em">Recurrence</span>
          <button id="recur-toggle-btn" type="button"
            style="background:none;border:1px solid var(--input-border);border-radius:6px;padding:3px 10px;font-size:0.78rem;color:var(--text);cursor:pointer">
            Make Recurring
          </button>
        </div>

        <div class="modal-export-actions">
          <button class="btn-export" id="modal-add-outlook" type="button" title="Add this appointment to your Outlook calendar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="12" y1="14" x2="12" y2="18"/><line x1="10" y1="16" x2="14" y2="16"/></svg>
            Add to Outlook
          </button>
          <button class="btn-export" id="modal-export-ics" type="button" title="Export as .ics and attach to a new Outlook email">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Export .ics
          </button>
        </div>

        <div class="modal-actions">
          <button class="btn-cancel" id="modal-cancel">Cancel</button>
          <button class="btn-delete" id="modal-delete" style="display:none">Delete</button>
          <button class="btn-save" id="modal-save">Save</button>
        </div>
      </div><!-- end .modal-left -->

      <!-- ── RIGHT COLUMN (recurrence panel, hidden until toggled) ── -->
      <div class="modal-right" id="modal-right" style="display:none">
        <div style="font-size:0.78rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border-soft)">Recurrence Pattern</div>

        <div id="recur-panel">
          <!-- Pattern type -->
          <div style="display:flex;gap:12px;flex-wrap:wrap;font-size:0.82rem;margin-bottom:8px">
            <label style="display:flex;align-items:center;gap:4px"><input type="radio" name="recur-type" value="daily"> Daily</label>
            <label style="display:flex;align-items:center;gap:4px"><input type="radio" name="recur-type" value="weekly"> Weekly</label>
            <label style="display:flex;align-items:center;gap:4px"><input type="radio" name="recur-type" value="monthly"> Monthly</label>
            <label style="display:flex;align-items:center;gap:4px"><input type="radio" name="recur-type" value="yearly"> Yearly</label>
          </div>

          <!-- Daily -->
          <div id="rp-daily" style="display:none;font-size:0.82rem;margin-bottom:8px">
            Every <input id="r-daily-int" type="number" value="1" min="1" max="365"
              style="width:46px;text-align:center;padding:2px 4px;border:1px solid var(--input-border);border-radius:4px;background:var(--bg);color:var(--text)"> day(s)
          </div>

          <!-- Weekly -->
          <div id="rp-weekly" style="display:none;font-size:0.82rem;margin-bottom:8px">
            <div style="margin-bottom:6px">
              Every <input id="r-weekly-int" type="number" value="1" min="1" max="52"
                style="width:46px;text-align:center;padding:2px 4px;border:1px solid var(--input-border);border-radius:4px;background:var(--bg);color:var(--text)"> week(s) on:
            </div>
            <div id="r-dow-row" style="display:flex;gap:6px;flex-wrap:wrap"></div>
          </div>

          <!-- Monthly -->
          <div id="rp-monthly" style="display:none;font-size:0.82rem;margin-bottom:8px">
            <label style="display:flex;align-items:center;gap:5px;margin-bottom:5px;flex-wrap:wrap">
              <input type="radio" name="r-monthly-mode" value="day" checked>
              Day <input id="r-month-day" type="number" value="1" min="1" max="31"
                style="width:40px;text-align:center;padding:2px 4px;border:1px solid var(--input-border);border-radius:4px;background:var(--bg);color:var(--text)">
              of every <input id="r-month-int" type="number" value="1" min="1" max="99"
                style="width:40px;text-align:center;padding:2px 4px;border:1px solid var(--input-border);border-radius:4px;background:var(--bg);color:var(--text)"> month(s)
            </label>
            <label style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
              <input type="radio" name="r-monthly-mode" value="weekday">
              The
              <select id="r-month-week" style="padding:2px 4px;border:1px solid var(--input-border);border-radius:4px;background:var(--bg);color:var(--text)">
                <option value="1">First</option><option value="2">Second</option>
                <option value="3">Third</option><option value="4">Fourth</option><option value="-1">Last</option>
              </select>
              <select id="r-month-dow" style="padding:2px 4px;border:1px solid var(--input-border);border-radius:4px;background:var(--bg);color:var(--text)">
                <option value="0">Sunday</option><option value="1">Monday</option><option value="2">Tuesday</option>
                <option value="3">Wednesday</option><option value="4">Thursday</option><option value="5">Friday</option><option value="6">Saturday</option>
              </select>
              of every <input id="r-month-int2" type="number" value="1" min="1" max="99"
                style="width:40px;text-align:center;padding:2px 4px;border:1px solid var(--input-border);border-radius:4px;background:var(--bg);color:var(--text)"> month(s)
            </label>
          </div>

          <!-- Yearly -->
          <div id="rp-yearly" style="display:none;font-size:0.82rem;margin-bottom:8px">
            Every <input id="r-yearly-int" type="number" value="1" min="1" max="10"
              style="width:40px;text-align:center;padding:2px 4px;border:1px solid var(--input-border);border-radius:4px;background:var(--bg);color:var(--text)"> year(s)
            on <input id="r-yearly-label" type="text" readonly
              style="width:64px;padding:2px 5px;border:1px solid var(--input-border);border-radius:4px;background:var(--bg);color:var(--text);cursor:default">
          </div>

          <!-- Range of Recurrence -->
          <div style="border-top:1px solid var(--border-soft);padding-top:8px;margin-top:4px">
            <div style="font-size:0.72rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px">Range of Recurrence</div>
            <!-- 3-col grid: [radio 18px] [label 68px] [input auto] -->
            <div style="display:grid;grid-template-columns:18px 68px auto;gap:6px;align-items:center;font-size:0.82rem">
              <span></span>
              <span style="color:var(--text-muted)">Start:</span>
              <input id="r-range-start" type="date"
                style="padding:2px 5px;border:1px solid var(--input-border);border-radius:4px;background:var(--bg);color:var(--text)">

              <input type="radio" id="r-et-date" name="r-end-type" value="date" checked
                style="margin:0;justify-self:center;cursor:pointer;accent-color:var(--accent)">
              <label for="r-et-date" style="margin:0;cursor:pointer">End by:</label>
              <input id="r-end-date" type="date"
                style="padding:2px 5px;border:1px solid var(--input-border);border-radius:4px;background:var(--bg);color:var(--text)">

              <input type="radio" id="r-et-count" name="r-end-type" value="count"
                style="margin:0;justify-self:center;cursor:pointer;accent-color:var(--accent)">
              <label for="r-et-count" style="margin:0;cursor:pointer">End after:</label>
              <span style="display:flex;align-items:center;gap:4px">
                <input id="r-end-count" type="number" value="10" min="1" max="999"
                  style="width:50px;text-align:center;padding:2px 4px;border:1px solid var(--input-border);border-radius:4px;background:var(--bg);color:var(--text)">
                occurrences
              </span>

              <input type="radio" id="r-et-never" name="r-end-type" value="never"
                style="margin:0;justify-self:center;cursor:pointer;accent-color:var(--accent)">
              <label for="r-et-never" style="grid-column:span 2;margin:0;cursor:pointer">No end date</label>
            </div>
          </div>
        </div><!-- end #recur-panel -->
      </div><!-- end .modal-right -->

    </div><!-- end .modal-body -->
  </div>
</div>

<!-- Recurrence Action Overlay (delete/edit this-or-all) -->
<div id="recur-action-overlay" class="modal-overlay" style="display:none">
  <div class="modal" style="width:320px">
    <h2 id="recur-action-title">Recurring Event</h2>
    <p id="recur-action-msg" style="font-size:0.88rem;color:var(--text-muted);margin:0 0 18px"></p>
    <div class="modal-actions">
      <button class="btn-cancel" id="recur-action-cancel">Cancel</button>
      <button class="btn-save"   id="recur-action-single">This occurrence</button>
      <button class="btn-delete" id="recur-action-all">All occurrences</button>
    </div>
  </div>
</div>


<!-- New Calendar Modal -->
<div id="cal-name-overlay" class="modal-overlay" style="display:none">
  <div class="modal" style="width:340px">
    <h2 id="cal-modal-title">New Calendar</h2>
    <label>Name</label>
    <input type="text" id="new-cal-name" placeholder="e.g. Work, Personal" maxlength="50">
    <label style="margin-top:13px">Calendar Color</label>
    <div class="color-row" id="cal-color-row"></div>
    <label style="display:flex;align-items:center;gap:8px;margin-top:16px;cursor:pointer">
      <input type="checkbox" id="new-cal-work-enable" style="width:15px;height:15px;cursor:pointer;accent-color:var(--accent)">
      <span>Enable work hours shading</span>
      <span style="font-size:0.72rem;color:var(--text-muted);font-weight:400">(shades off-hours in week/day view)</span>
    </label>
    <div id="new-cal-work-fields" style="display:none;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px">
      <div>
        <label style="margin-top:0">Work Start</label>
        <input type="time" id="new-cal-work-start" value="09:00">
      </div>
      <div>
        <label style="margin-top:0">Work End</label>
        <input type="time" id="new-cal-work-end" value="17:00">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="cal-name-cancel">Cancel</button>
      <button class="btn-save" id="cal-name-save">Create</button>
    </div>
  </div>
</div>

<!-- Group Name Modal -->
<div id="group-name-overlay" class="modal-overlay" style="display:none">
  <div class="modal" style="width:320px">
    <h2 id="group-modal-title">New Group</h2>
    <label>Group Name</label>
    <input type="text" id="group-name-input" placeholder="e.g. Work, Personal" maxlength="50">
    <div class="modal-actions">
      <button class="btn-cancel" id="group-name-cancel">Cancel</button>
      <button class="btn-save" id="group-name-save">Create</button>
    </div>
  </div>
</div>

<!-- Settings Panel -->
<div id="settings-overlay" class="settings-overlay" style="display:none">
  <div class="settings-panel">
    <h2>&#9881; Settings</h2>
    <div class="settings-group">
      <label>Appearance</label>
      <div style="display:flex;align-items:center;gap:10px">
        <button id="theme-btn" style="background:none;border:1px solid var(--input-border);border-radius:6px;padding:5px 9px;cursor:pointer;font-size:1rem;line-height:1;transition:all .15s" title="Toggle light/dark theme">&#127769;</button>
        <span id="theme-label" style="font-size:0.82rem;color:var(--text)">Light Mode</span>
      </div>
    </div>
    <div class="settings-group">
      <label>Main Color</label>
      <div class="settings-color-row">
        <input type="color" id="settings-main-color">
        <input type="text" id="settings-main-hex" maxlength="7" placeholder="#4f46e5">
      </div>
    </div>
    <div class="settings-group">
      <label>Accent Hover Color</label>
      <div class="settings-color-row">
        <input type="color" id="settings-accent-hover-color">
        <input type="text" id="settings-accent-hover-hex" maxlength="7" placeholder="#ede9fe">
      </div>
    </div>
    <div class="settings-actions">
      <button class="btn-reset" id="settings-reset">Reset</button>
      <button class="btn-cancel" id="settings-cancel">Cancel</button>
      <button class="btn-save" id="settings-save">Save</button>
    </div>
  </div>
</div>

<!-- Event hover popover -->
<div id="ev-popover" class="ev-popover"></div>

<!-- Toast notifications host -->
<div id="toast-host" class="toast-host"></div>

<script defer src="js/vendor/ics.js"></script>
<script defer src="js/calendar.ics.js"></script>
<script defer src="js/calendar.js"></script>
</body>
</html>
